<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030712">
    <title>Färöarna Open 2026</title>
    <link rel="icon" type="image/jpeg" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
    <!-- Link our stylesheet -->
  <link rel="stylesheet" href="styles.css">

    
    <!-- Include custom fonts via Google Fonts.  Teko for headings and Inter for body text -->
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
<!-- SEGA MEGADRIVE!!! -->    
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;700&family=Inter:wght@400;500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (params.get('theme') === 'genesis') {
          const link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = 'styles-genesis.css';
          document.head.appendChild(link);
        }
      })();
    </script>

<!-- SLUT PÅ SEGA MEGADRIVE!!! -->
    
</head>

<body class="tournament-fullscreen">
  
    <div id="app" class="container">
        <!-- Header / Hero card -->
        <header id="header" class="hero">
<div class="hero-left">
  <img
    class="hero-logo"
    src="logo.svg"
    alt="Färöarna Open"
  >
  <h1 class="title sr-only">Färöarna Open 2026</h1>
</div>
            <!-- Replace backup and reset buttons with a hamburger menu -->
            <div class="hero-right">
                <div class="menu">
                    <button id="menu-toggle" class="menu-toggle">☰</button>
                    <div id="menu-dropdown" class="menu-dropdown" hidden>
                        <button id="backup-btn" class="btn menu-item">Backup</button>
                        <button id="import-btn" class="btn menu-item">Importera backup</button>
                        <button id="auto-results-menu-btn" class="btn menu-item debug">Fyll i resultat (debug)</button>
                        <button id="reset-btn" class="btn menu-item">Nollställ</button>
                    </div>
                </div>
        <!-- Latest result (toast) is placed here to be vertically centered within the header -->
        <div id="toast" class="toast" hidden></div>
            </div>
        </header>

        <!-- Main content area -->
        <main id="content">
            <!-- Select participants stage -->
            <section id="select-stage" class="stage">
                <h2>Välj deltagare</h2>
                <div class="controls">
                    <label for="num-slots-select">Antal platser:</label>
                    <select id="num-slots-select">
                        <!-- Options filled from JS (12–22) -->
                    </select>
                    <span class="selected-counter">Valda: <span id="selected-count">0</span> / <span id="slots-total">0</span></span>
                </div>
                <button id="draw-btn" class="btn btn-primary" disabled>Lottning</button>
                <p id="select-hint" class="hint"></p>
                <div id="nation-list" class="nation-list"></div>
            </section>

            <!-- Draw stage: assign teams to groups -->
            <section id="draw-stage" class="stage" hidden>
                <h2>Lottning – tilldela grupper</h2>
                <div class="draw-instructions">
                    Klicka på en nation och sedan på en gruppplats för att tilldela. Du kan även dra och släppa.
                </div>
                <div id="selected-nations" class="selected-nations"></div>
                <div id="groups-container" class="groups-container"></div>
                <div class="draw-actions">
                    <button id="fill-all-draw" class="btn btn-secondary debug">Fyll i alla (debug)</button>
                    <button id="start-tournament-btn" class="btn btn-primary" disabled>Starta turnering</button>
                </div>
            </section>

            <!-- Tournament stage -->
            <section id="tournament-stage" class="stage" hidden>
                <div class="tournament-overview">
                    <!-- Now playing area -->
                    <div id="now-playing" class="now-playing">
                        <h2 class="overview-title">Kör nu</h2>
                        <div id="current-matches" class="current-matches"></div>
                    </div>
                    <!-- Groups rankings area -->
                    <div class="rankings-panel">
                        <h2 class="overview-title rankings-title">Ställningen just nu</h2>
                        <div id="groups-rankings" class="groups-rankings"></div>
                        <div class="marathon-section">
                            <button id="schedule-btn" class="btn btn-primary">Spelschema och resultat</button>
                            <button id="marathon-btn" class="btn btn-secondary">Maratontabellen just nu</button>
                        </div>
                    </div>
                </div>
                <div id="upcoming-wrap" class="upcoming-wrap upcoming-full-row" hidden>
                    <h3 class="upcoming-title">Kommande:</h3>
                    <div id="upcoming-matches" class="upcoming-matches"></div><span>&copy;2026 erik@enkel.design</span><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2427 1618" role="img" aria-labelledby="logo-footer-title" preserveAspectRatio="xMidYMid meet" shape-rendering="geometricPrecision">
                    <title id="logo-footer-title">Enkel Design logotyp – till sidans start</title>

                    <path d="M1588,0C1324.9,0 1091.22,125.677 943.469,320.188C1055.27,338.894 1159.21,380.623 1250.47,440.188C1339.42,358.741 1457.89,309 1588,309C1864.14,309 2088,532.858 2088,809C2088,1082.69 1868.07,1304.88 1595.31,1308.81C1568.76,1418.61 1519.77,1519.61 1453.53,1606.81C1497.27,1614.13 1542.18,1618 1588,1618C2034.8,1618 2397,1255.8 2397,809C2397,362.202 2034.8,0 1588,0ZM1588,500C1516.76,500 1451.2,524.18 1398.94,564.688C1534.4,709.056 1617.59,903.031 1617.97,1116.53C1774.56,1101.46 1897,969.542 1897,809C1897,638.344 1758.66,500 1588,500Z" />
                </svg>
                <!-- Marathon 
                <div class="marathon-section">
                    <button id="schedule-btn" class="btn btn-primary">Visa spelschema</button>
                    <button id="marathon-btn" class="btn btn-secondary">Visa maratontabell</button>
                -->
            </section>

        </main>

        <!-- Marathon modal -->
        <div id="marathon-modal" class="modal" hidden>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Maratontabell</h2>
                    <button id="close-marathon" class="btn btn-secondary">Stäng</button>
                </div>
                <div id="marathon-table" class="marathon-table"></div>
            </div>
        </div>

        <!-- Schedule modal -->
        <div id="schedule-modal" class="modal" hidden>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Spelschema och resultat</h2>
                    <button id="close-schedule" class="btn btn-secondary">Stäng</button>
                </div>
                <div id="schedule-modal-list" class="schedule-list"></div>
            </div>
        </div>
    </div>

        <!-- Toast notification for match results inside header for vertical centering -->
        <!-- Moved inside header to align centrally -->

    <!-- Load global data definitions before the main script.  This file defines
         RULESET, MARATHON and HISTORIK on the window object so that
         main.js can access them without using ES module imports. -->
    <script src="data/global-data.js"></script>
    <!-- Main script for the app -->
    <script src="main.js"></script>
</body>
</html>
