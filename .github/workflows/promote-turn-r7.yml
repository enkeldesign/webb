name: Promote TURN R7 to production branch

on:
  push:
    branches:
      - turn-production-release-r7
    paths:
      - '.github/workflows/promote-turn-r7.yml'
      - '.github/scripts/promote-turn-r7.sh'
      - 'turn-lab/**'

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out production release branch
        uses: actions/checkout@v4
        with:
          ref: turn-production-release-r7
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Promote verified R7 runtime
        run: bash .github/scripts/promote-turn-r7.sh

      - name: Syntax-check production modules
        run: find turn -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Run verified race and replay regression tests
        run: node turn-lab/tests/regression.mjs

      - name: Verify refactored LAB architecture
        run: node turn-lab/scripts/check-release.mjs

      - name: Commit production candidate
        run: |
          if [ -z "$(git status --porcelain -- turn)" ]; then
            echo 'Production candidate is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn
          git commit -m 'Promote verified TURN R7 runtime to production [skip ci]'
          git push origin HEAD:turn-production-release-r7
