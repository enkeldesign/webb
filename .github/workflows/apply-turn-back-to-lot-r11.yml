name: Apply TURN r11 Back to the Lot

on:
  push:
    branches:
      - turn-back-to-lot-r11
    paths:
      - '.github/scripts/apply-turn-back-to-lot-r11.mjs'
      - '.github/workflows/apply-turn-back-to-lot-r11.yml'
      - '.github/turn-back-to-lot-r11-trigger'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: turn-back-to-lot-r11
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply guarded r11 integration
        run: node .github/scripts/apply-turn-back-to-lot-r11.mjs

      - name: Syntax-check TURN modules
        run: find turn turn-lab -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Commit integrated runtime
        run: |
          if [ -z "$(git status --porcelain -- turn turn-lab/tests)" ]; then
            echo 'TURN r11 integration already applied.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn turn-lab/tests
          git commit -m 'Integrate Back to the Lot race control [skip ci]'
          git push origin HEAD:turn-back-to-lot-r11
