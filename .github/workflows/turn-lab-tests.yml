name: TURN regression suite

on:
  pull_request:
    branches:
      - main
    paths:
      - 'turn/**'
      - 'turn-lab/**'
      - '.github/workflows/turn-lab-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'turn/**'
      - 'turn-lab/**'
      - '.github/workflows/turn-lab-tests.yml'

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Syntax-check TURN modules
        run: find turn turn-lab -type f \( -name '*.js' -o -name '*.mjs' \) -print0 | xargs -0 -n1 node --check

      - name: Run race and replay regression tests
        run: node turn-lab/tests/regression.mjs

      - name: Run multi-track and Airport regression
        run: node turn-lab/tests/multi-track-production.mjs

      - name: Run world containment and collision regression
        run: node turn-lab/tests/world-collision-production.mjs

      - name: Run production manual steering regression
        run: node turn-lab/tests/manual-steering-production.mjs

      - name: Run production garage regression
        run: node turn-lab/tests/garage-production.mjs

      - name: Run all-car orientation regression
        run: node turn-lab/tests/car-orientation-production.mjs

      - name: Run native and secondary paint regression
        run: node turn-lab/tests/native-paint-production.mjs

      - name: Run app icon and PWA branding regression
        run: node turn-lab/tests/app-icon-production.mjs

      - name: Run balance and anti-shortcut regression
        run: node turn-lab/tests/balance-and-checkpoints.mjs

      - name: Run unified drive pad and reverse regression
        run: node turn-lab/tests/drive-pad-production.mjs

      - name: Run state-aware in-game menu regression
        run: node turn-lab/tests/in-game-menu-production.mjs

      - name: Run lap result toast regression
        run: node turn-lab/tests/lap-result-toast-production.mjs

      - name: Run production sound foundation regression
        run: node turn-lab/tests/audio-foundation-production.mjs

      - name: Run production performance and diagnostics regression
        run: node turn-lab/tests/performance-production.mjs

      - name: Verify release architecture
        run: node turn-lab/scripts/check-release.mjs
