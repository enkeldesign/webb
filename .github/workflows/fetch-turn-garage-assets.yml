name: Fetch TURN garage assets

on:
  push:
    branches:
      - turn-lot-garage-v1
    paths:
      - '.github/scripts/fetch-turn-garage-assets.sh'
      - '.github/workflows/fetch-turn-garage-assets.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/scripts/fetch-turn-garage-assets.sh'
      - '.github/workflows/fetch-turn-garage-assets.yml'

permissions:
  contents: write

jobs:
  fetch-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: turn-lot-garage-v1
          fetch-depth: 0

      - name: Fetch selected official Kenney assets
        run: bash .github/scripts/fetch-turn-garage-assets.sh

      - name: Verify all fifteen car models
        run: |
          test "$(find turn/assets/cars -maxdepth 1 -name '*.glb' | wc -l)" -eq 15
          test "$(find turn/assets/lot-bricks -maxdepth 1 -name '*.glb' | wc -l)" -eq 9

      - name: Commit vendored assets
        run: |
          if [ -z "$(git status --porcelain -- turn/assets)" ]; then
            echo 'Garage assets already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn/assets
          git commit -m 'Vendor selected Kenney garage assets [skip ci]'
          git push origin HEAD:turn-lot-garage-v1
