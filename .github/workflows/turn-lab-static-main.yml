name: Build TURN LAB static core

on:
  push:
    branches:
      - turn-lab-static-main-batch-01
    paths:
      - '.github/workflows/turn-lab-static-main.yml'
      - 'turn-lab/scripts/**'
      - 'turn-lab/index.html'
      - 'turn-lab/app.js'
      - 'turn-lab/main.js'
      - 'turn-lab/input/analog-gas.js'
      - 'turn-lab/ui/gameplay-controls.js'
      - 'turn-lab/game.js'
      - 'turn-lab/game-prepatch.js'
      - 'turn-lab/gameplay-features.js'
      - 'turn-lab/core-state-v1.js'
      - 'turn-lab/driving-core-v1.js'
      - 'turn-lab/render-core-v1.js'
      - 'turn-lab/motion-adapter.js'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/turn-lab-static-main.yml'
      - 'turn-lab/scripts/**'
      - 'turn-lab/index.html'
      - 'turn-lab/app.js'
      - 'turn-lab/main.js'
      - 'turn-lab/input/analog-gas.js'
      - 'turn-lab/ui/gameplay-controls.js'
      - 'turn-lab/game.js'
      - 'turn-lab/game-prepatch.js'
      - 'turn-lab/gameplay-features.js'
      - 'turn-lab/core-state-v1.js'
      - 'turn-lab/driving-core-v1.js'
      - 'turn-lab/render-core-v1.js'
      - 'turn-lab/motion-adapter.js'

permissions:
  contents: write

jobs:
  build-static-main:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: turn-lab-static-main-batch-01
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate static game core
        run: node turn-lab/scripts/build-static-main.mjs

      - name: Syntax-check static runtime modules
        run: |
          for file in \
            turn-lab/main.js \
            turn-lab/app.js \
            turn-lab/input/analog-gas.js \
            turn-lab/ui/gameplay-controls.js \
            turn-lab/input/motion.js \
            turn-lab/vehicle/physics.js \
            turn-lab/race/game-state.js \
            turn-lab/race/lap-system.js \
            turn-lab/race/replay-system.js \
            turn-lab/race/rival-storage.js \
            turn-lab/render/camera.js \
            turn-lab/render/world.js \
            turn-lab/ui/hud.js \
            turn-lab/ui/spectate.js; do
              node --input-type=module --check < "$file"
          done

      - name: Verify static runtime architecture
        run: node turn-lab/scripts/check-static-runtime.mjs

      - name: Commit generated core
        run: |
          if [ -z "$(git status --porcelain -- turn-lab/main.js)" ]; then
            echo 'Static core is already up to date.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add turn-lab/main.js
          git commit -m 'Generate static TURN LAB game core [skip ci]'
          git push origin HEAD:turn-lab-static-main-batch-01
