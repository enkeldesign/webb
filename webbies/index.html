          .lineTo(
            end.x,
            end.y
          );

        aimGraphics
          .lineStyle(
            2,
            COLORS.white,
            .75
          )
          .moveTo(
            webbie.pos.x,
            webbie.pos.y
          )
          .lineTo(
            end.x,
            end.y
          );

        aimGraphics
          .beginFill(
            webbie.color,
            .92
          )
          .drawCircle(
            end.x,
            end.y,
            6
          )
          .endFill();

        for (
          let index = 1;
          index < 6;
          index += 1
        ) {
          const amount =
            index / 6;

          aimGraphics
            .beginFill(
              COLORS.white,
              .36
            )
            .drawCircle(
              lerp(
                webbie.pos.x,
                end.x,
                amount
              ),

              lerp(
                webbie.pos.y,
                end.y,
                amount
              ),

              1.7
            )
            .endFill();
        }
      }

      app.ticker.add(
        () => {
          const rawDelta =
            Math.min(
              app.ticker.deltaMS /
              1000,

              1 / 30
            );

          const frozen =
            state.paused ||
            state.aiming ||
            state.transitioning ||
            state.resetting;

          const deltaTime =
            frozen
              ? 0
              : rawDelta;

          state.time +=
            deltaTime;

          for (
            let index = 1;
            index <
              backdrop.children.length;
            index += 1
          ) {
            const speck =
              backdrop.children[
                index
              ];

            speck.y +=
              Math.sin(
                state.time *
                speck._drift +
                speck._phase
              ) *
              .018;

            speck.alpha =
              .14 +
              (
                Math.sin(
                  state.time *
                  speck._drift *
                  1.4 +
                  speck._phase
                ) +
                1
              ) *
              .08;
          }

          if (
            deltaTime > 0 &&
            state.world
          ) {
            for (
              const obstacle
              of state.obstacles
            ) {
              obstacle.update(
                deltaTime
              );
            }

            for (
              const webbie
              of state.webbies
            ) {
              webbie.update(
                deltaTime
              );
            }

            for (
              const webbie
              of state.webbies
            ) {
              webbie.thread.update(
                deltaTime
              );
            }

            for (
              const webbie
              of state.webbies
            ) {
              webbie.thread.update(
                deltaTime *
                .35
              );
            }

            state.boss?.update(
              deltaTime
            );

            for (
              let index =
                state.nets.length -
                1;

              index >= 0;
              index -= 1
            ) {
              state.nets[index]
                .update(
                  deltaTime
                );
            }

            checkFinish();
          }

          for (
            const webbie
            of state.webbies
          ) {
            webbie.thread.draw();
            webbie.draw();
          }

          state.boss?.draw();

          drawAim();
          updateParticles(rawDelta);
          updateButtons();

          if (
            state.messageTimer > 0
          ) {
            state.messageTimer -=
              rawDelta;

            messagePlate.alpha =
              clamp(
                state.messageTimer *
                4,

                0,
                1
              );
          } else {
            messagePlate.alpha = 0;
          }

          if (
            state.shake > .1
          ) {
            state.shake *=
              Math.pow(
                .03,
                rawDelta
              );

            const shakeX =
              (
                Math.random() -
                .5
              ) *
              state.shake;

            const shakeY =
              (
                Math.random() -
                .5
              ) *
              state.shake;

            worldHost.position.set(
              shakeX,
              shakeY
            );
          } else {
            worldHost.position.set(
              0,
              0
            );

            state.shake = 0;
          }
        }
      );

      buildLevel(1);
    })();
  </script>
</body>
