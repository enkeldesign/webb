<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  >
  <meta name="theme-color" content="#102230">
  <title>Webbies – solo co-op prototype</title>

  <style>
    :root {
      color-scheme: dark;
      --bg-0: #08121d;
      --bg-1: #0f2233;
      --bg-2: #163048;
      --panel: rgb(9 20 33 / .84);
      --line: rgb(255 255 255 / .12);
      --text: #f3fbff;
      --muted: rgb(243 251 255 / .72);
      --mint: #b8f2d0;
      --pink: #f6a3cb;
      --blue: #a5e0ff;
      --gold: #ffe59e;
      --danger: #ff6d8b;
      --control-h: 10rem;
      --safe-b: env(safe-area-inset-bottom, 0px);
      font-family:
        Inter,
        ui-rounded,
        "SF Pro Rounded",
        system-ui,
        sans-serif;
      background: var(--bg-0);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      inline-size: 100%;
      block-size: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      background:
        radial-gradient(circle at 50% 10%, #20405c 0, transparent 40%),
        linear-gradient(180deg, #08111a 0%, #060c14 100%);
      color: var(--text);
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      display: grid;
      grid-template-rows: 1fr auto;
      inline-size: 100%;
      block-size: 100%;
    }

    .game-wrap {
      position: relative;
      min-block-size: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 18%, rgb(173 235 197 / .10), transparent 32%),
        radial-gradient(circle at 12% 45%, rgb(120 180 255 / .08), transparent 36%),
        radial-gradient(circle at 88% 72%, rgb(190 130 255 / .07), transparent 28%),
        linear-gradient(180deg, #112534, #0a1725 60%, #0a1420);
    }

    #game {
      position: absolute;
      inset: 0;
    }

    .hud {
      position: absolute;
      inset: .85rem .85rem auto .85rem;
      z-index: 20;
      display: flex;
      gap: .65rem;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }

    .hud-left,
    .hud-right {
      display: grid;
      gap: .45rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      min-block-size: 2.75rem;
      padding: .65rem .9rem;
      border: 1px solid var(--line);
      border-radius: 1.2rem;
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: 0 .45rem 1rem rgb(0 0 0 / .20);
    }

    .title-pill {
      display: grid;
      gap: .1rem;
      min-inline-size: 10.5rem;
    }

    .title-pill strong {
      font-size: 1rem;
      line-height: 1;
      letter-spacing: .06em;
    }

    .title-pill span {
      font-size: .78rem;
      color: var(--mint);
      font-weight: 800;
      letter-spacing: .08em;
    }

    .goal-pill {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .active-pill {
      font-size: .82rem;
      font-weight: 800;
      color: var(--text);
    }

    .message {
      position: absolute;
      inset: 5rem 50% auto auto;
      transform: translateX(50%);
      z-index: 19;
      max-inline-size: min(80vw, 22rem);
      padding: .7rem .95rem;
      border: 1px solid var(--line);
      border-radius: 1rem;
      background: rgb(7 17 28 / .82);
      backdrop-filter: blur(12px);
      box-shadow: 0 .45rem 1rem rgb(0 0 0 / .22);
      font-size: .82rem;
      line-height: 1.35;
      text-align: center;
      color: var(--text);
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }

    .message.is-visible {
      opacity: 1;
    }

    .hint {
      position: absolute;
      inset: auto 50% .9rem auto;
      transform: translateX(50%);
      z-index: 18;
      padding: .55rem .85rem;
      border: 1px solid rgb(255 255 255 / .08);
      border-radius: 999px;
      background: rgb(9 20 32 / .52);
      font-size: .72rem;
      color: rgb(255 255 255 / .64);
      letter-spacing: .03em;
      pointer-events: none;
      backdrop-filter: blur(10px);
    }

    .controls {
      position: relative;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: .85rem;
      align-items: center;
      min-block-size: var(--control-h);
      padding:
        .8rem
        .9rem
        calc(.8rem + var(--safe-b));
      border-top: 1px solid rgb(255 255 255 / .06);
      background:
        linear-gradient(180deg, rgb(5 12 20 / .90), rgb(5 11 18 / .98));
      box-shadow: 0 -1rem 2rem rgb(0 0 0 / .24);
      touch-action: manipulation;
    }

    .cluster {
      display: flex;
      align-items: center;
      gap: .7rem;
    }

    .cluster.center {
      justify-content: center;
      flex-direction: column;
      gap: .55rem;
    }

    .cluster.right {
      justify-content: flex-end;
    }

    .d-pad {
      display: flex;
      gap: .7rem;
      align-items: center;
    }

    .v-pad {
      display: grid;
      gap: .55rem;
    }

    button {
      appearance: none;
      border: 1px solid rgb(255 255 255 / .12);
      border-radius: 1.25rem;
      background:
        radial-gradient(circle at 35% 25%, rgb(255 255 255 / .08), transparent 40%),
        linear-gradient(180deg, rgb(22 38 56 / .95), rgb(10 19 31 / .95));
      color: var(--text);
      font: inherit;
      font-weight: 900;
      letter-spacing: .04em;
      box-shadow:
        0 .6rem 1.1rem rgb(0 0 0 / .25),
        inset 0 1px 0 rgb(255 255 255 / .04);
      touch-action: manipulation;
      user-select: none;
    }

    button:active,
    button.is-held {
      transform: translateY(1px) scale(.97);
    }

    .dir-btn {
      inline-size: 4rem;
      block-size: 4rem;
      border-radius: 50%;
      font-size: 1.65rem;
      line-height: 1;
    }

    .action-btn {
      min-inline-size: 7.2rem;
      min-block-size: 2.7rem;
      padding: .6rem .95rem;
      font-size: .9rem;
    }

    .secondary-btn {
      min-inline-size: 7.2rem;
      min-block-size: 2.6rem;
      padding: .55rem .9rem;
      font-size: .84rem;
      color: var(--muted);
    }

    .action-btn.weave {
      border-color: rgb(184 242 208 / .38);
      box-shadow:
        0 .7rem 1.1rem rgb(0 0 0 / .24),
        0 0 0 .12rem rgb(184 242 208 / .09),
        inset 0 1px 0 rgb(255 255 255 / .04);
    }

    .action-btn.drop {
      border-color: rgb(255 109 139 / .28);
    }

    .pause-btn {
      min-inline-size: 5rem;
      min-block-size: 2.45rem;
      padding: .45rem .8rem;
      font-size: .8rem;
    }

    .btn-hidden {
      visibility: hidden;
      pointer-events: none;
    }

    @media (max-width: 420px) {
      .controls {
        grid-template-columns: 1fr;
        gap: .75rem;
        justify-items: center;
      }

      .cluster.left,
      .cluster.center,
      .cluster.right {
        justify-content: center;
      }

      .cluster.center {
        flex-direction: row;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="game-wrap">
      <div id="game" aria-label="Webbies game area"></div>

      <div class="hud">
        <div class="hud-left">
          <div class="pill title-pill">
            <strong>WEBBIES</strong>
            <span id="levelLabel">CANOPY 1</span>
          </div>
          <div class="pill active-pill" id="activeLabel">ACTIVE: PIP</div>
        </div>

        <div class="hud-right">
          <div class="pill goal-pill" id="goalLabel">build a weave to cross</div>
          <div class="pill goal-pill" id="bossLabel" style="display:none;">boss: hook twice, pull into weave</div>
        </div>
      </div>

      <div class="message" id="message"></div>
      <div class="hint">Tap a Webbie to switch. Drag the world to shoot silk.</div>
    </section>

    <section class="controls" aria-label="Touch controls">
      <div class="cluster left">
        <div class="d-pad">
          <button class="dir-btn" id="leftBtn" aria-label="Move left">◀</button>
          <button class="dir-btn" id="rightBtn" aria-label="Move right">▶</button>
        </div>
      </div>

      <div class="cluster center">
        <button class="action-btn weave" id="weaveBtn">WEAVE</button>
        <button class="secondary-btn drop" id="dropBtn">DROP!</button>
        <button class="pause-btn" id="pauseBtn">PAUSE</button>
      </div>

      <div class="cluster right">
        <div class="v-pad">
          <button class="dir-btn" id="upBtn" aria-label="Up or climb">▲</button>
          <button class="dir-btn" id="downBtn" aria-label="Down or descend">▼</button>
        </div>
      </div>
    </section>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"
    onerror="
      this.onerror = null;
      this.src = 'https://unpkg.com/pixi.js@7.4.2/dist/pixi.min.js';
    "
  ></script>

  <script>
    (() => {
      "use strict";

      const WORLD_W = 420;
      const WORLD_H = 700;
      const GRAVITY = 980;
      const MAX_THREAD = 330;
      const FAIL_MARGIN = 60;

      const COLORS = {
        sky0: 0x102230,
        sky1: 0x132b3f,
        sky2: 0x1f3c55,
        leaf: 0xb8e48c,
        leaf2: 0x95d47e,
        branch: 0x8b7658,
        web: 0xf4fbff,
        weave: 0xd9f6e5,
        weaveGlow: 0xbef2d8,
        pink: 0xf59ec9,
        pinkDeep: 0xd77ca8,
        blue: 0xa4dfff,
        blueDeep: 0x78bddd,
        ink: 0x102231,
        danger: 0xff6d8b,
        mint: 0xb8f2d0,
        gold: 0xffe7a8,
        white: 0xffffff,
        black: 0x000000,
        shadow: 0x04101a
      };

      const gameElement = document.getElementById("game");
      const levelLabel = document.getElementById("levelLabel");
      const activeLabel = document.getElementById("activeLabel");
      const goalLabel = document.getElementById("goalLabel");
      const bossLabel = document.getElementById("bossLabel");
      const messageElement = document.getElementById("message");
      const weaveBtn = document.getElementById("weaveBtn");
      const dropBtn = document.getElementById("dropBtn");
      const pauseBtn = document.getElementById("pauseBtn");

      const leftBtn = document.getElementById("leftBtn");
      const rightBtn = document.getElementById("rightBtn");
      const upBtn = document.getElementById("upBtn");
      const downBtn = document.getElementById("downBtn");

      const app = new PIXI.Application({
        resizeTo: gameElement,
        antialias: true,
        autoDensity: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2),
        backgroundAlpha: 0
      });

      gameElement.appendChild(app.view);

      const root = new PIXI.Container();
      const backdrop = new PIXI.Container();
      const worldLayer = new PIXI.Container();
      const fxLayer = new PIXI.Container();

      root.addChild(backdrop, worldLayer, fxLayer);
      app.stage.addChild(root);

      function fitWorld() {
        const viewportWidth = app.screen.width;
        const viewportHeight = app.screen.height;

        const scale = Math.min(
          viewportWidth / WORLD_W,
          viewportHeight / WORLD_H
        );

        root.scale.set(scale);
        root.position.set(
          (viewportWidth - WORLD_W * scale) / 2,
          (viewportHeight - WORLD_H * scale) / 2
        );
      }

      app.renderer.on("resize", fitWorld);
      fitWorld();

      const state = {
        time: 0,
        paused: false,
        aiming: false,
        pointerId: null,
        aimPoint: null,
        messageTimer: 0,
        screenIndex: 0,
        transitioning: false,
        activeIndex: 0,
        platforms: [],
        weaves: [],
        webbies: [],
        boss: null,
        particles: [],
        playfield: null,
        finishZone: { y: 74, x1: 78, x2: 342 },
        input: {
          left: false,
          right: false,
          up: false,
          down: false
        },
        jumpLatch: false
      };

      const SCREENS = [
        {
          name: "CANOPY 1",
          goal: "build a weave to cross",
          boss: false,
          start: [
            { x: 78, y: 606 },
            { x: 118, y: 606 }
          ],
          platforms: [
            { x: 16, y: 622, w: 122, h: 30, type: "solid" },
            { x: 282, y: 622, w: 122, h: 30, type: "solid" },
            { x: 100, y: 480, w: 88, h: 20, type: "solid" },
            { x: 235, y: 442, w: 92, h: 20, type: "solid" },
            { x: 18, y: 308, w: 98, h: 20, type: "solid" },
            { x: 286, y: 250, w: 100, h: 22, type: "crumbly" },
            { x: 148, y: 130, w: 124, h: 18, type: "solid" }
          ],
          intro:
            "Screen 1: Use two anchored silk lines, then press WEAVE to create a bridge."
        },

        {
          name: "CANOPY 2",
          goal: "use the weave as a launcher",
          boss: false,
          start: [
            { x: 74, y: 606 },
            { x: 114, y: 606 }
          ],
          platforms: [
            { x: 18, y: 622, w: 118, h: 30, type: "solid" },
            { x: 16, y: 468, w: 104, h: 20, type: "solid" },
            { x: 268, y: 532, w: 116, h: 22, type: "solid" },
            { x: 146, y: 378, w: 118, h: 20, type: "moving", range: 54, speed: 1.15 },
            { x: 300, y: 248, w: 100, h: 20, type: "spikes" },
            { x: 242, y: 158, w: 144, h: 18, type: "solid" },
            { x: 38, y: 214, w: 94, h: 18, type: "solid" }
          ],
          intro:
            "Screen 2: Build a weave, stand one Webbie on top, then pull it from below to sling the other upward."
        },

        {
          name: "CANOPY 3",
          goal: "boss time",
          boss: true,
          start: [
            { x: 74, y: 606 },
            { x: 346, y: 606 }
          ],
          platforms: [
            { x: 18, y: 622, w: 100, h: 28, type: "solid" },
            { x: 302, y: 622, w: 100, h: 28, type: "solid" },
            { x: 40, y: 478, w: 84, h: 20, type: "solid" },
            { x: 296, y: 478, w: 84, h: 20, type: "solid" },
            { x: 154, y: 352, w: 112, h: 18, type: "moving", range: 72, speed: 0.9 },
            { x: 10, y: 244, w: 110, h: 18, type: "solid" },
            { x: 300, y: 206, w: 102, h: 18, type: "solid" },
            { x: 154, y: 120, w: 112, h: 18, type: "solid" }
          ],
          intro:
            "Screen 3: Hook the wasp with both Webbies and drag it down into a weave."
        }
      ];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function dist(a, b) {
        return Math.hypot(b.x - a.x, b.y - a.y);
      }

      function normalize(x, y) {
        const length = Math.hypot(x, y) || 1;
        return { x: x / length, y: y / length };
      }

      function segIntersect(a, b, c, d) {
        const r = { x: b.x - a.x, y: b.y - a.y };
        const s = { x: d.x - c.x, y: d.y - c.y };
        const denominator = r.x * s.y - r.y * s.x;

        if (Math.abs(denominator) < 1e-6) {
          return null;
        }

        const u = ((c.x - a.x) * r.y - (c.y - a.y) * r.x) / denominator;
        const t = ((c.x - a.x) * s.y - (c.y - a.y) * s.x) / denominator;

        if (t >= 0 && t <= 1 && u >= 0 && u <= 1) {
          return {
            x: a.x + t * r.x,
            y: a.y + t * r.y,
            t,
            u
          };
        }

        return null;
      }

      function pointSegmentDistance(point, a, b) {
        const abx = b.x - a.x;
        const aby = b.y - a.y;
        const ab2 = abx * abx + aby * aby || 1;

        const t = clamp(
          ((point.x - a.x) * abx + (point.y - a.y) * aby) / ab2,
          0,
          1
        );

        const closest = {
          x: a.x + abx * t,
          y: a.y + aby * t
        };

        return {
          distance: Math.hypot(point.x - closest.x, point.y - closest.y),
          point: closest,
          t
        };
      }

      function hashNoise(seed) {
        const value = Math.sin(seed * 12.9898) * 43758.5453;
        return value - Math.floor(value);
      }

      function showMessage(text, duration = 1.4) {
        messageElement.textContent = text;
        messageElement.classList.add("is-visible");
        state.messageTimer = duration;
      }

      function makeText(text, size, fill = 0xffffff, weight = "700") {
        return new PIXI.Text(text, {
          fontFamily:
            'Inter, ui-rounded, "SF Pro Rounded", system-ui, sans-serif',
          fontSize: size,
          fill,
          fontWeight: weight,
          align: "center",
          letterSpacing: 0.35
        });
      }

      function burst(x, y, color, count = 10, speed = 90) {
        for (let i = 0; i < count; i += 1) {
          const g = new PIXI.Graphics();
          const r = 1.4 + Math.random() * 2.6;

          g.beginFill(color, 0.9)
            .drawCircle(0, 0, r)
            .endFill();

          g.position.set(x, y);
          fxLayer.addChild(g);

          const angle = Math.random() * Math.PI * 2;
          const velocity = speed * (0.35 + Math.random() * 0.65);

          state.particles.push({
            g,
            x,
            y,
            vx: Math.cos(angle) * velocity,
            vy: Math.sin(angle) * velocity,
            life: 0.35 + Math.random() * 0.55,
            age: 0
          });
        }
      }

      function updateParticles(dt) {
        for (let i = state.particles.length - 1; i >= 0; i -= 1) {
          const p = state.particles[i];
          p.age += dt;
          p.vy += 180 * dt;
          p.g.x += p.vx * dt;
          p.g.y += p.vy * dt;
          p.g.alpha = 1 - p.age / p.life;

          if (p.age >= p.life) {
            p.g.destroy();
            state.particles.splice(i, 1);
          }
        }
      }

      function drawBackdrop() {
        backdrop.removeChildren();

        const bg = new PIXI.Graphics();
        bg.beginFill(COLORS.sky0)
          .drawRect(0, 0, WORLD_W, WORLD_H)
          .endFill();

        bg.beginFill(COLORS.sky1, 0.65)
          .drawEllipse(210, 108, 280, 150)
          .endFill();

        bg.beginFill(COLORS.sky2, 0.34)
          .drawEllipse(80, 430, 175, 280)
          .endFill();

        bg.beginFill(0x2a305d, 0.2)
          .drawEllipse(346, 470, 170, 240)
          .endFill();

        backdrop.addChild(bg);

        const branches = new PIXI.Graphics();
        branches.lineStyle(18, COLORS.branch, 0.95);
        branches.moveTo(-20, 90).bezierCurveTo(40, 20, 140, 12, 220, 44);
        branches.moveTo(150, 46).bezierCurveTo(270, 70, 330, 30, 450, 56);
        branches.moveTo(-10, 595).bezierCurveTo(80, 565, 160, 600, 248, 574);
        branches.moveTo(215, 574).bezierCurveTo(305, 548, 365, 590, 440, 560);
        backdrop.addChild(branches);

        const leaves = new PIXI.Graphics();

        for (let i = 0; i < 22; i += 1) {
          const x = hashNoise(i + 9) * WORLD_W;
          const y = hashNoise(i + 39) * WORLD_H;
          const rot = hashNoise(i + 80) * Math.PI;
          const size = 10 + hashNoise(i + 115) * 16;

          leaves.beginFill(i % 2 ? COLORS.leaf : COLORS.leaf2, 0.82);
          leaves.drawEllipse(0, 0, size, size * 0.48);
          leaves.endFill();

          const leaf = new PIXI.Graphics();
          leaf.beginFill(i % 2 ? COLORS.leaf : COLORS.leaf2, 0.82);
          leaf.drawEllipse(0, 0, size, size * 0.48);
          leaf.endFill();
          leaf.position.set(x, y);
          leaf.rotation = rot;
          backdrop.addChild(leaf);
        }

        const webCorners = new PIXI.Graphics();
        webCorners.lineStyle(1.5, COLORS.web, 0.18);

        function cornerWeb(cx, cy, flipX = 1) {
          for (let i = 1; i <= 4; i += 1) {
            webCorners.moveTo(cx, cy)
              .lineTo(cx + flipX * i * 18, cy + i * 14);
          }
          for (let i = 1; i <= 4; i += 1) {
            webCorners.moveTo(cx + flipX * i * 18, cy + i * 14)
              .quadraticCurveTo(
                cx + flipX * (i * 14),
                cy + i * 8,
                cx + flipX * (i * 4),
                cy + i * 18
              );
          }
        }

        cornerWeb(16, 16, 1);
        cornerWeb(WORLD_W - 16, 12, -1);
        cornerWeb(8, WORLD_H - 140, 1);
        backdrop.addChild(webCorners);

        for (let i = 0; i < 36; i += 1) {
          const speck = new PIXI.Graphics();
          const x = hashNoise(i + 160) * WORLD_W;
          const y = hashNoise(i + 220) * WORLD_H;
          const r = 1 + hashNoise(i + 260) * 2.8;

          speck.beginFill(i % 3 ? 0xffffff : COLORS.mint, 0.12 + hashNoise(i + 300) * 0.22)
            .drawCircle(0, 0, r)
            .endFill();

          speck.position.set(x, y);
          speck._phase = hashNoise(i + 340) * Math.PI * 2;
          speck._drift = 0.25 + hashNoise(i + 380) * 0.6;
          backdrop.addChild(speck);
        }
      }

      class Platform {
        constructor(config) {
          this.x = config.x;
          this.y = config.y;
          this.w = config.w;
          this.h = config.h;
          this.type = config.type || "solid";
          this.baseX = this.x;
          this.range = config.range || 0;
          this.speed = config.speed || 0;
          this.vx = 0;
          this.graphics = new PIXI.Graphics();
          worldLayer.addChild(this.graphics);
          state.platforms.push(this);
          this.draw();
        }

        get harmful() {
          return this.type === "spikes";
        }

        get crumbly() {
          return this.type === "crumbly";
        }

        update(dt) {
          if (this.type === "moving") {
            const newX = this.baseX + Math.sin(state.time * this.speed) * this.range;
            this.vx = (newX - this.x) / Math.max(dt, 1e-6);
            this.x = newX;
          } else {
            this.vx = 0;
          }

          this.graphics.position.set(this.x, this.y);
        }

        draw() {
          const g = this.graphics;
          g.clear();

          let fill = 0x273f5d;
          let line = 0x516f99;

          if (this.type === "crumbly") {
            fill = 0x5c4660;
            line = COLORS.pink;
          }

          if (this.type === "spikes") {
            fill = 0x48354e;
            line = COLORS.danger;
          }

          if (this.type === "moving") {
            fill = 0x22485d;
            line = COLORS.blue;
          }

          g.beginFill(COLORS.shadow, 0.25)
            .drawRoundedRect(5, 8, this.w, this.h, 12)
            .endFill();

          g.beginFill(fill)
            .drawRoundedRect(0, 0, this.w, this.h, 12)
            .endFill();

          g.lineStyle(2, line, 0.82)
            .drawRoundedRect(1, 1, this.w - 2, this.h - 2, 11);

          if (this.type === "spikes") {
            g.beginFill(COLORS.danger, 0.88);

            const count = Math.max(3, Math.floor(this.w / 22));
            const step = this.w / count;

            for (let i = 0; i < count; i += 1) {
              g.moveTo(i * step + 3, this.h - 4);
              g.lineTo(i * step + step * 0.5, 4);
              g.lineTo((i + 1) * step - 3, this.h - 4);
            }

            g.endFill();
          }

          if (this.type === "crumbly") {
            g.lineStyle(2, 0xffd7ea, 0.42);
            g.moveTo(this.w * 0.22, 3)
              .lineTo(this.w * 0.42, this.h * 0.5)
              .lineTo(this.w * 0.29, this.h - 3);

            g.moveTo(this.w * 0.7, 3)
              .lineTo(this.w * 0.58, this.h * 0.45)
              .lineTo(this.w * 0.8, this.h - 3);
          }

          if (this.type === "moving") {
            g.beginFill(COLORS.blue, 0.72)
              .drawCircle(14, this.h * 0.5, 3)
              .drawCircle(this.w - 14, this.h * 0.5, 3)
              .endFill();
          }

          this.graphics.position.set(this.x, this.y);
        }
      }

      class Weave {
        constructor(a, b) {
          this.a = { x: a.x, y: a.y };
          this.b = { x: b.x, y: b.y };
          this.rest = {
            x: (this.a.x + this.b.x) * 0.5,
            y: (this.a.y + this.b.y) * 0.5 + 18
          };
          this.control = {
            x: this.rest.x,
            y: this.rest.y
          };
          this.vel = { x: 0, y: 0 };
          this.pulls = [];
          this.graphics = new PIXI.Graphics();
          worldLayer.addChild(this.graphics);
          state.weaves.push(this);
          this.draw();
        }

        clearPulls() {
          this.pulls.length = 0;
        }

        addPull(fromPoint, intensity = 1) {
          this.pulls.push({
            x: fromPoint.x,
            y: fromPoint.y,
            intensity
          });
        }

        update(dt) {
          let forceX = (this.rest.x - this.control.x) * 6.6;
          let forceY = (this.rest.y - this.control.y) * 8.1;

          for (const pull of this.pulls) {
            forceX += (pull.x - this.control.x) * 0.9 * pull.intensity;
            forceY += (pull.y - this.control.y) * 1.2 * pull.intensity;
          }

          this.vel.x += forceX * dt;
          this.vel.y += forceY * dt;

          this.vel.x *= Math.pow(0.04, dt);
          this.vel.y *= Math.pow(0.03, dt);

          this.control.x += this.vel.x * dt;
          this.control.y += this.vel.y * dt;

          this.control.x = clamp(
            this.control.x,
            Math.min(this.a.x, this.b.x) - 70,
            Math.max(this.a.x, this.b.x) + 70
          );

          this.control.y = clamp(
            this.control.y,
            Math.min(this.a.y, this.b.y) - 24,
            Math.max(this.a.y, this.b.y) + 120
          );
        }

        sample(t) {
          const mt = 1 - t;
          return {
            x:
              mt * mt * this.a.x +
              2 * mt * t * this.control.x +
              t * t * this.b.x,
            y:
              mt * mt * this.a.y +
              2 * mt * t * this.control.y +
              t * t * this.b.y
          };
        }

        tangent(t) {
          return {
            x: 2 * (1 - t) * (this.control.x - this.a.x) + 2 * t * (this.b.x - this.control.x),
            y: 2 * (1 - t) * (this.control.y - this.a.y) + 2 * t * (this.b.y - this.control.y)
          };
        }

        nearest(point) {
          let best = { distance: Infinity, point: null, t: 0 };

          for (let i = 0; i < 18; i += 1) {
            const t1 = i / 18;
            const t2 = (i + 1) / 18;
            const p1 = this.sample(t1);
            const p2 = this.sample(t2);
            const near = pointSegmentDistance(point, p1, p2);

            if (near.distance < best.distance) {
              best = {
                distance: near.distance,
                point: near.point,
                t: lerp(t1, t2, near.t)
              };
            }
          }

          return best;
        }

        distanceToPoint(point) {
          return this.nearest(point).distance;
        }

        collide(webbie) {
          const nearest = this.nearest(webbie.pos);

          if (nearest.distance > webbie.radius + 2) {
            return;
          }

          const tangent = this.tangent(nearest.t);
          let normal = normalize(-tangent.y, tangent.x);

          if (normal.y > 0) {
            normal.x *= -1;
            normal.y *= -1;
          }

          const toward = {
            x: webbie.pos.x - nearest.point.x,
            y: webbie.pos.y - nearest.point.y
          };

          const side = toward.x * normal.x + toward.y * normal.y;

          if (side > webbie.radius + 1) {
            return;
          }

          const targetDistance = webbie.radius + 1;
          webbie.pos.x = nearest.point.x + normal.x * targetDistance;
          webbie.pos.y = nearest.point.y + normal.y * targetDistance;

          const normalVelocity = webbie.vel.x * normal.x + webbie.vel.y * normal.y;

          if (normalVelocity < 0) {
            webbie.vel.x -= normal.x * normalVelocity;
            webbie.vel.y -= normal.y * normalVelocity;
          }

          if (normal.y < -0.55) {
            webbie.grounded = true;
            webbie.onWeave = this;
            webbie.jumpReset();

            const tangentUnit = normalize(tangent.x, tangent.y);

            if (this.vel.y < -120) {
              const launch = Math.min(520, -this.vel.y * 1.25);
              webbie.vel.y = Math.min(webbie.vel.y, -launch);
              webbie.vel.x += tangentUnit.x * launch * 0.34;
              burst(webbie.pos.x, webbie.pos.y, COLORS.mint, 5, 60);
            }
          }
        }

        rayHit(origin, end) {
          let best = null;

          for (let i = 0; i < 20; i += 1) {
            const t1 = i / 20;
            const t2 = (i + 1) / 20;
            const p1 = this.sample(t1);
            const p2 = this.sample(t2);
            const hit = segIntersect(origin, end, p1, p2);

            if (hit && (!best || hit.t < best.t)) {
              best = {
                x: hit.x,
                y: hit.y,
                t: lerp(t1, t2, hit.u)
              };
            }
          }

          return best;
        }

        draw() {
          const g = this.graphics;
          g.clear();

          g.lineStyle(8, COLORS.weaveGlow, 0.11);
          g.moveTo(this.a.x, this.a.y);
          g.quadraticCurveTo(
            this.control.x,
            this.control.y,
            this.b.x,
            this.b.y
          );

          g.lineStyle(2.4, COLORS.web, 0.96);
          g.moveTo(this.a.x, this.a.y);
          g.quadraticCurveTo(
            this.control.x,
            this.control.y,
            this.b.x,
            this.b.y
          );

          g.lineStyle(1.25, COLORS.weave, 0.72);

          for (let i = 1; i <= 7; i += 1) {
            const t = i / 8;
            const p = this.sample(t);
            g.moveTo(p.x, p.y);
            g.lineTo(this.control.x, this.control.y);
          }

          for (let i = 1; i <= 4; i += 1) {
            const yOffset = i * 6;
            g.moveTo(this.a.x, this.a.y + yOffset);
            g.quadraticCurveTo(
              this.control.x,
              this.control.y + yOffset * 0.5,
              this.b.x,
              this.b.y + yOffset
            );
          }
        }
      }

      class Boss {
        constructor() {
          this.x = 210;
          this.y = 176;
          this.vx = 55;
          this.vy = 0;
          this.radius = 24;
          this.defeated = false;

          this.container = new PIXI.Container();
          this.shadow = new PIXI.Graphics();
          this.body = new PIXI.Graphics();
          this.label = makeText("ORCHARD WASP", 10, COLORS.gold, "900");
          this.label.anchor.set(0.5);
          this.label.y = -44;

          this.container.addChild(this.shadow, this.body, this.label);
          worldLayer.addChild(this.container);
        }

        hookedCount() {
          return state.webbies.filter(
            webbie =>
              webbie.thread.active &&
              webbie.thread.anchor &&
              webbie.thread.anchor.kind === "boss"
          ).length;
        }

        update(dt) {
          if (this.defeated) {
            this.container.visible = false;
            return;
          }

          const hooks = this.hookedCount();
          const targetX = 210 + Math.sin(state.time * 0.9) * 112;
          const targetY = 160 + Math.sin(state.time * 1.6) * 32;
          const stiffness = hooks >= 2 ? 0.22 : 1;

          this.vx += (targetX - this.x) * 1.1 * dt * stiffness;
          this.vy += (targetY - this.y) * 1.0 * dt * stiffness;

          this.vx *= Math.pow(0.16, dt);
          this.vy *= Math.pow(0.16, dt);

          this.x += this.vx * dt;
          this.y += this.vy * dt;

          this.x = clamp(this.x, 52, WORLD_W - 52);
          this.y = clamp(this.y, 94, 264);

          if (hooks >= 2 && state.weaves.length) {
            const caught = state.weaves.some(
              weave => weave.distanceToPoint({ x: this.x, y: this.y }) < this.radius * 0.78
            );

            if (caught) {
              this.defeat();
            }
          }

          this.draw();
        }

        defeat() {
          if (this.defeated) {
            return;
          }

          this.defeated = true;

          state.webbies.forEach(webbie => {
            if (webbie.thread.active && webbie.thread.anchor && webbie.thread.anchor.kind === "boss") {
              webbie.thread.release(false);
            }
          });

          burst(this.x, this.y, COLORS.gold, 24, 160);
          burst(this.x, this.y, COLORS.mint, 18, 130);
          showMessage("Boss cocooned! Both Webbies can climb out now.", 2.2);
        }

        draw() {
          this.container.visible = true;
          this.container.position.set(this.x, this.y);
          this.container.rotation = Math.sin(state.time * 5) * 0.05;

          this.shadow.clear();
          this.shadow.beginFill(COLORS.black, 0.18)
            .drawEllipse(0, 24, 28, 9)
            .endFill();

          this.body.clear();

          const hookGlow = this.hookedCount() >= 2 ? COLORS.mint : COLORS.gold;

          this.body.beginFill(hookGlow, 0.10)
            .drawCircle(0, 0, 38)
            .endFill();

          this.body.beginFill(0xeaf8ff, 0.34)
            .drawEllipse(-16, -3, 16, 8)
            .drawEllipse(16, -3, 16, 8)
            .endFill();

          this.body.beginFill(0x3f284e)
            .drawEllipse(0, 4, 22, 14)
            .endFill();

          this.body.beginFill(COLORS.gold)
            .drawRoundedRect(-18, -12, 36, 7, 4)
            .drawRoundedRect(-19, 2, 38, 7, 4)
            .endFill();

          this.body.beginFill(0x22152d)
            .drawCircle(-8, -17, 6)
            .drawCircle(8, -17, 6)
            .endFill();

          this.body.beginFill(COLORS.danger)
            .drawCircle(-8, -17, 2)
            .drawCircle(8, -17, 2)
            .endFill();

          this.body.beginFill(0x2a1b39)
            .moveTo(19, 4)
            .lineTo(36, 9)
            .lineTo(18, 13)
            .endFill();
        }
      }

      class Thread {
        constructor(owner) {
          this.owner = owner;
          this.active = false;
          this.length = 0;
          this.anchor = null;
          this.graphics = new PIXI.Graphics();
          worldLayer.addChild(this.graphics);
        }

        getAnchorPosition() {
          if (!this.anchor) {
            return { x: this.owner.pos.x, y: this.owner.pos.y };
          }

          if (this.anchor.kind === "point") {
            return { x: this.anchor.x, y: this.anchor.y };
          }

          if (this.anchor.kind === "weave") {
            return this.anchor.weave.sample(this.anchor.t);
          }

          if (this.anchor.kind === "boss" && state.boss) {
            return { x: state.boss.x, y: state.boss.y };
          }

          return { x: this.owner.pos.x, y: this.owner.pos.y };
        }

        attach(anchor) {
          this.active = true;
          this.anchor = anchor;
          this.length = clamp(dist(this.owner.pos, this.getAnchorPosition()), 28, MAX_THREAD);
          burst(this.owner.pos.x, this.owner.pos.y, this.owner.color, 4, 40);
        }

        release(withBurst = true) {
          if (!this.active) {
            return;
          }

          if (withBurst) {
            const p = this.getAnchorPosition();
            burst(p.x, p.y, this.owner.color, 5, 50);
          }

          this.active = false;
          this.anchor = null;
          this.length = 0;
        }

        update(dt, inputX, inputY) {
          if (!this.active || !this.anchor) {
            return;
          }

          if (this.anchor.kind === "point" || this.anchor.kind === "boss") {
            this.length = clamp(this.length + inputY * 120 * dt, 28, MAX_THREAD);
          }

          if (this.anchor.kind === "weave") {
            const extraPull = 1 + Math.max(0, inputY) * 1.7;
            this.anchor.weave.addPull(this.owner.pos, extraPull);
          }

          const anchorPos = this.getAnchorPosition();
          const dx = this.owner.pos.x - anchorPos.x;
          const dy = this.owner.pos.y - anchorPos.y;
          const distance = Math.hypot(dx, dy) || 1;
          const nx = dx / distance;
          const ny = dy / distance;

          const tx = -ny;
          const ty = nx;

          this.owner.vel.x += tx * inputX * 440 * dt;
          this.owner.vel.y += ty * inputX * 440 * dt;

          if (distance > this.length) {
            const excess = distance - this.length;

            this.owner.pos.x -= nx * excess;
            this.owner.pos.y -= ny * excess;

            const radial = this.owner.vel.x * nx + this.owner.vel.y * ny;
            if (radial > 0) {
              this.owner.vel.x -= nx * radial;
              this.owner.vel.y -= ny * radial;
            }

            if (this.anchor.kind === "boss" && state.boss && !state.boss.defeated) {
              state.boss.x += nx * excess * 0.22;
              state.boss.y += ny * excess * 0.22;
              state.boss.vx += nx * excess * 2.2;
              state.boss.vy += ny * excess * 2.2;
            }
          }
        }

        draw() {
          this.graphics.clear();

          if (!this.active || !this.anchor) {
            return;
          }

          const p = this.getAnchorPosition();

          this.graphics.lineStyle(7, this.owner.color, 0.12);
          this.graphics.moveTo(this.owner.pos.x, this.owner.pos.y);
          this.graphics.lineTo(p.x, p.y);

          this.graphics.lineStyle(2.2, COLORS.web, 0.96);
          this.graphics.moveTo(this.owner.pos.x, this.owner.pos.y);
          this.graphics.lineTo(p.x, p.y);
        }
      }

      class Webbie {
        constructor(name, palette, x, y) {
          this.name = name;
          this.color = palette.main;
          this.deep = palette.deep;
          this.eye = 0x203245;
          this.pos = { x, y };
          this.prev = { x, y };
          this.vel = { x: 0, y: 0 };
          this.radius = 16;
          this.grounded = false;
          this.onWeave = null;
          this.thread = new Thread(this);
          this.container = new PIXI.Container();
          this.shadow = new PIXI.Graphics();
          this.body = new PIXI.Graphics();
          this.face = new PIXI.Graphics();
          this.nameText = makeText(name, 11, COLORS.white, "800");

          this.nameText.anchor.set(0.5);
          this.nameText.y = -30;

          this.container.addChild(this.shadow, this.body, this.face, this.nameText);
          this.container.eventMode = "static";
          this.container.cursor = "pointer";
          this.container.hitArea = new PIXI.Circle(0, 0, 30);

          this.container.on("pointerdown", event => {
            event.stopPropagation();
            selectWebbie(this);
          });

          worldLayer.addChild(this.container);
        }

        jumpReset() {
          if (getActive() === this) {
            state.jumpLatch = false;
          }
        }

        update(dt) {
          this.prev.x = this.pos.x;
          this.prev.y = this.pos.y;
          this.grounded = false;
          this.onWeave = null;

          const active = getActive() === this;
          const inputX = active
            ? (state.input.right ? 1 : 0) - (state.input.left ? 1 : 0)
            : 0;

          const inputY = active
            ? (state.input.down ? 1 : 0) - (state.input.up ? 1 : 0)
            : 0;

          if (active && state.input.up && this.grounded && !state.jumpLatch) {
            this.vel.y = -360;
            this.grounded = false;
            state.jumpLatch = true;
          }

          if (active && !state.input.up) {
            state.jumpLatch = false;
          }

          if (!this.thread.active) {
            const accel = this.grounded ? 670 : 250;
            this.vel.x += inputX * accel * dt;
          } else {
            this.thread.update(dt, inputX, inputY);
          }

          this.vel.y += GRAVITY * dt;

          if (this.grounded) {
            this.vel.x *= Math.pow(0.02, dt);
          } else {
            this.vel.x *= Math.pow(0.22, dt);
          }

          this.vel.y = Math.min(this.vel.y, 900);

          this.pos.x += this.vel.x * dt;
          this.pos.y += this.vel.y * dt;

          this.pos.x = clamp(this.pos.x, this.radius + 4, WORLD_W - this.radius - 4);

          for (const platform of state.platforms) {
            resolveCircleRect(this, platform);
          }

          this.draw();
        }

        draw() {
          const active = getActive() === this;
          const g = this.body;
          const f = this.face;

          this.container.position.set(this.pos.x, this.pos.y);
          this.container.rotation = clamp(this.vel.x / 900, -0.16, 0.16);

          this.shadow.clear();
          this.shadow.beginFill(COLORS.black, 0.18)
            .drawEllipse(0, 18, 19, 8)
            .endFill();

          g.clear();

          if (active) {
            g.lineStyle(2.2, COLORS.white, 0.16);
            g.drawCircle(0, 0, 25 + Math.sin(state.time * 6) * 1.2);
          }

          for (let i = 0; i < 8; i += 1) {
            const side = i < 4 ? -1 : 1;
            const row = i % 4;
            const y = -10 + row * 7;
            const bend = 16 + (row % 2) * 4;
            const gait = Math.sin(state.time * 10 + row + this.pos.x * 0.02) * 1.8;

            g.lineStyle(3.8, this.deep, 0.9);
            g.moveTo(side * 6, y);
            g.quadraticCurveTo(
              side * bend,
              y - 5 + gait * side,
              side * 22,
              y + 4
            );
          }

          const fluffOffsets = [
            [-11, -2], [-8, -10], [0, -13], [8, -10], [11, -2],
            [-10, 8], [-4, 13], [4, 13], [10, 8]
          ];

          for (const [ox, oy] of fluffOffsets) {
            g.beginFill(this.color, 0.98)
              .drawCircle(ox, oy, 6.8)
              .endFill();
          }

          g.beginFill(this.deep, 0.22)
            .drawEllipse(1, 5, 12, 14)
            .endFill();

          g.beginFill(this.color)
            .drawCircle(0, -3, 13)
            .drawCircle(0, 8, 15)
            .endFill();

          g.beginFill(COLORS.white, 0.16)
            .drawCircle(-4, -6, 4.5)
            .endFill();

          f.clear();
          f.beginFill(0xffffff)
            .drawCircle(-4, -4, 3.8)
            .drawCircle(4, -4, 3.8)
            .endFill();

          f.beginFill(this.eye)
            .drawCircle(-3.5, -3.8, 1.7)
            .drawCircle(4.5, -3.8, 1.7)
            .endFill();

          f.beginFill(0xffffff, 0.65)
            .drawCircle(-2.8, -4.6, 0.6)
            .drawCircle(5.1, -4.6, 0.6)
            .endFill();

          f.beginFill(0xffb7c6, 0.64)
            .drawCircle(-8, 1, 2.4)
            .drawCircle(8, 1, 2.4)
            .endFill();

          f.lineStyle(1.5, this.eye, 0.9);
          f.arc(0, 2.5, 3.2, 0.15, Math.PI - 0.15);
        }
      }

      function getActive() {
        return state.webbies[state.activeIndex];
      }

      function selectWebbie(webbie) {
        const index = state.webbies.indexOf(webbie);

        if (index < 0) {
          return;
        }

        state.activeIndex = index;
        refreshHud();
        burst(webbie.pos.x, webbie.pos.y, webbie.color, 5, 48);
      }

      function refreshHud() {
        const screen = SCREENS[state.screenIndex];
        levelLabel.textContent = screen.name;
        goalLabel.textContent = screen.goal;
        bossLabel.style.display = screen.boss ? "inline-flex" : "none";

        const active = getActive();
        activeLabel.textContent = `ACTIVE: ${active.name.toUpperCase()}`;
        activeLabel.style.borderColor = active.name === "Pip"
          ? "rgb(165 224 255 / .30)"
          : "rgb(246 163 203 / .30)";

        weaveBtn.classList.toggle("btn-hidden", !canWeave());
        dropBtn.classList.toggle(
          "btn-hidden",
          state.webbies.every(webbie => !webbie.thread.active)
        );
      }

      function clearWorld() {
        worldLayer.removeChildren();
        state.platforms.length = 0;
        state.weaves.length = 0;
        state.webbies.length = 0;
        state.boss = null;

        for (const p of state.particles) {
          p.g.destroy();
        }
        state.particles.length = 0;
      }

      function buildScreen(index) {
        clearWorld();

        state.screenIndex = index;
        state.activeIndex = 0;
        state.aiming = false;
        state.pointerId = null;
        state.aimPoint = null;
        state.paused = false;
        pauseBtn.textContent = "PAUSE";

        const screen = SCREENS[index];

        for (const config of screen.platforms) {
          new Platform(config);
        }

        const pip = new Webbie(
          "Pip",
          { main: COLORS.blue, deep: COLORS.blueDeep },
          screen.start[0].x,
          screen.start[0].y
        );

        const purl = new Webbie(
          "Purl",
          { main: COLORS.pink, deep: COLORS.pinkDeep },
          screen.start[1].x,
          screen.start[1].y
        );

        state.webbies.push(pip, purl);

        if (screen.boss) {
          state.boss = new Boss();
        }

        if (!state.playfield) {
          state.playfield = new PIXI.Graphics();
          state.playfield.beginFill(0xffffff, 0.001)
            .drawRect(0, 0, WORLD_W, WORLD_H)
            .endFill();

          state.playfield.eventMode = "static";
          state.playfield.hitArea = new PIXI.Rectangle(0, 0, WORLD_W, WORLD_H);

          state.playfield.on("pointerdown", startAim);
          state.playfield.on("pointerup", finishAim);
          state.playfield.on("pointerupoutside", finishAim);

          worldLayer.addChildAt(state.playfield, 0);
        } else {
          worldLayer.addChildAt(state.playfield, 0);
        }

        refreshHud();
        showMessage(screen.intro, 2.6);
      }

      function resolveCircleRect(webbie, platform) {
        const rectX = platform.x;
        const rectY = platform.y;
        const rectW = platform.w;
        const rectH = platform.h;

        const closestX = clamp(webbie.pos.x, rectX, rectX + rectW);
        const closestY = clamp(webbie.pos.y, rectY, rectY + rectH);

        let dx = webbie.pos.x - closestX;
        let dy = webbie.pos.y - closestY;
        let d2 = dx * dx + dy * dy;

        if (d2 >= webbie.radius * webbie.radius) {
          return;
        }

        if (platform.harmful) {
          fail(`${webbie.name} hit spikes`);
          return;
        }

        if (d2 === 0) {
          const left = Math.abs(webbie.pos.x - rectX);
          const right = Math.abs(rectX + rectW - webbie.pos.x);
          const top = Math.abs(webbie.pos.y - rectY);
          const bottom = Math.abs(rectY + rectH - webbie.pos.y);
          const min = Math.min(left, right, top, bottom);

          if (min === top) {
            dx = 0;
            dy = -1;
          } else if (min === bottom) {
            dx = 0;
            dy = 1;
          } else if (min === left) {
            dx = -1;
            dy = 0;
          } else {
            dx = 1;
            dy = 0;
          }

          d2 = 1;
        }

        const distance = Math.sqrt(d2);
        const nx = dx / distance;
        const ny = dy / distance;
        const overlap = webbie.radius - distance;

        webbie.pos.x += nx * overlap;
        webbie.pos.y += ny * overlap;

        const normalVelocity = webbie.vel.x * nx + webbie.vel.y * ny;

        if (normalVelocity < 0) {
          webbie.vel.x -= nx * normalVelocity;
          webbie.vel.y -= ny * normalVelocity;
        }

        if (ny < -0.55) {
          webbie.grounded = true;
          webbie.jumpReset();

          if (platform.type === "moving") {
            webbie.pos.x += platform.vx * app.ticker.deltaMS / 1000;
          }

          if (platform.crumbly) {
            platform.graphics.alpha = Math.max(0.4, platform.graphics.alpha - 0.02);
          }
        }
      }

      function canWeave() {
        if (state.webbies.length < 2) {
          return false;
        }

        const [a, b] = state.webbies;
        if (!a.thread.active || !b.thread.active) {
          return false;
        }

        if (!a.thread.anchor || !b.thread.anchor) {
          return false;
        }

        if (a.thread.anchor.kind !== "point" || b.thread.anchor.kind !== "point") {
          return false;
        }

        const p1 = a.thread.getAnchorPosition();
        const p2 = b.thread.getAnchorPosition();
        const gap = dist(p1, p2);

        return gap >= 64 && gap <= 240;
      }

      function createWeave() {
        if (!canWeave()) {
          showMessage("Both Webbies need world anchors before they can weave.", 1.4);
          return;
        }

        const [a, b] = state.webbies;
        const p1 = a.thread.getAnchorPosition();
        const p2 = b.thread.getAnchorPosition();

        new Weave(p1, p2);
        a.thread.release(false);
        b.thread.release(false);

        burst((p1.x + p2.x) * 0.5, (p1.y + p2.y) * 0.5, COLORS.mint, 16, 90);
        showMessage("Weave created! Use it as a bridge, catcher or sling.", 1.8);
        refreshHud();
      }

      function dropBoth() {
        let any = false;

        state.webbies.forEach(webbie => {
          if (webbie.thread.active) {
            webbie.thread.release(false);
            any = true;
          }
        });

        if (any) {
          showMessage("DROP!", 0.75);
          refreshHud();
        }
      }

      function togglePause() {
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? "PLAY" : "PAUSE";
        showMessage(state.paused ? "Paused." : "Back to climbing!", 0.8);
      }

      function fail(reason) {
        if (state.transitioning) {
          return;
        }

        state.transitioning = true;
        showMessage(reason, 1.15);

        const overlay = new PIXI.Graphics();
        overlay.beginFill(COLORS.danger, 0.11)
          .drawRect(0, 0, WORLD_W, WORLD_H)
          .endFill();

        fxLayer.addChild(overlay);

        setTimeout(() => {
          overlay.destroy();
          buildScreen(state.screenIndex);
          state.transitioning = false;
        }, 480);
      }

      function finishScreen() {
        if (state.transitioning) {
          return;
        }

        state.transitioning = true;
        showMessage("Both through! Climbing into the next canopy…", 1.3);

        setTimeout(() => {
          const next = (state.screenIndex + 1) % SCREENS.length;
          buildScreen(next);
          state.transitioning = false;
        }, 650);
      }

      function checkFinish() {
        const topPass =
          state.webbies.length &&
          state.webbies.every(
            webbie =>
              webbie.pos.y < state.finishZone.y &&
              webbie.pos.x > state.finishZone.x1 &&
              webbie.pos.x < state.finishZone.x2
          );

        if (!topPass) {
          return;
        }

        if (SCREENS[state.screenIndex].boss && state.boss && !state.boss.defeated) {
          return;
        }

        finishScreen();
      }

      function startAim(event) {
        if (state.paused || state.transitioning) {
          return;
        }

        const active = getActive();
        if (!active) {
          return;
        }

        state.aiming = true;
        state.pointerId = event.pointerId;
        state.aimPoint = event.getLocalPosition(worldLayer);
      }

      function finishAim(event) {
        if (!state.aiming) {
          return;
        }

        if (state.pointerId !== null && event.pointerId !== state.pointerId) {
          return;
        }

        const point = event.getLocalPosition(worldLayer);
        state.aiming = false;
        state.pointerId = null;
        shootSilk(getActive(), point);
      }

      app.stage.eventMode = "static";
      app.stage.hitArea = new PIXI.Rectangle(0, 0, WORLD_W, WORLD_H);

      app.stage.on("globalpointermove", event => {
        if (!state.aiming) {
          return;
        }

        state.aimPoint = event.getLocalPosition(worldLayer);
      });

      function rayRect(origin, dir, maxDistance, rect) {
        let tMin = 0;
        let tMax = maxDistance;

        for (const axis of ["x", "y"]) {
          const o = origin[axis];
          const d = dir[axis];
          const min = axis === "x" ? rect.x : rect.y;
          const max = axis === "x" ? rect.x + rect.w : rect.y + rect.h;

          if (Math.abs(d) < 1e-6) {
            if (o < min || o > max) {
              return null;
            }
          } else {
            let t1 = (min - o) / d;
            let t2 = (max - o) / d;

            if (t1 > t2) {
              const tmp = t1;
              t1 = t2;
              t2 = tmp;
            }

            tMin = Math.max(tMin, t1);
            tMax = Math.min(tMax, t2);

            if (tMin > tMax) {
              return null;
            }
          }
        }

        if (tMin >= 0 && tMin <= maxDistance) {
          return tMin;
        }

        return null;
      }

      function shootSilk(webbie, target) {
        if (!webbie) {
          return;
        }

        const dx = target.x - webbie.pos.x;
        const dy = target.y - webbie.pos.y;

        if (Math.hypot(dx, dy) < 18) {
          return;
        }

        const dir = normalize(dx, dy);
        const end = {
          x: webbie.pos.x + dir.x * MAX_THREAD,
          y: webbie.pos.y + dir.y * MAX_THREAD
        };

        const shotStart = { x: webbie.pos.x, y: webbie.pos.y };
        let best = null;

        for (const platform of state.platforms) {
          const hitDistance = rayRect(shotStart, dir, MAX_THREAD, platform);

          if (hitDistance !== null) {
            if (!best || hitDistance < best.distance) {
              best = {
                kind: "point",
                distance: hitDistance,
                point: {
                  x: shotStart.x + dir.x * hitDistance,
                  y: shotStart.y + dir.y * hitDistance
                }
              };
            }
          }
        }

        for (const weave of state.weaves) {
          const hit = weave.rayHit(shotStart, end);

          if (hit) {
            const d = Math.hypot(hit.x - shotStart.x, hit.y - shotStart.y);

            if (!best || d < best.distance) {
              best = {
                kind: "weave",
                distance: d,
                point: { x: hit.x, y: hit.y },
                t: hit.t,
                weave
              };
            }
          }
        }

        if (state.boss && !state.boss.defeated) {
          const ox = shotStart.x - state.boss.x;
          const oy = shotStart.y - state.boss.y;
          const b = 2 * (ox * dir.x + oy * dir.y);
          const c = ox * ox + oy * oy - state.boss.radius * state.boss.radius;
          const disc = b * b - 4 * c;

          if (disc >= 0) {
            const distance = (-b - Math.sqrt(disc)) / 2;

            if (distance >= 0 && distance <= MAX_THREAD) {
              if (!best || distance < best.distance) {
                best = {
                  kind: "boss",
                  distance,
                  point: {
                    x: shotStart.x + dir.x * distance,
                    y: shotStart.y + dir.y * distance
                  }
                };
              }
            }
          }
        }

        let cutSomething = false;

        for (const other of state.webbies) {
          if (other === webbie || !other.thread.active) {
            continue;
          }

          const p1 = other.pos;
          const p2 = other.thread.getAnchorPosition();
          const hit = segIntersect(shotStart, end, p1, p2);

          if (hit) {
            other.thread.release(false);
            burst(hit.x, hit.y, COLORS.danger, 9, 80);
            cutSomething = true;
          }
        }

        if (webbie.thread.active) {
          webbie.thread.release(false);
        }

        if (!best) {
          burst(end.x, end.y, COLORS.web, 5, 35);

          if (cutSomething) {
            showMessage("Snip! The new silk crossed another strand.", 1.0);
          }

          refreshHud();
          return;
        }

        if (best.kind === "point") {
          webbie.thread.attach({
            kind: "point",
            x: best.point.x,
            y: best.point.y
          });
        }

        if (best.kind === "weave") {
          webbie.thread.attach({
            kind: "weave",
            weave: best.weave,
            t: best.t
          });
        }

        if (best.kind === "boss") {
          webbie.thread.attach({
            kind: "boss"
          });

          const hooks =
            state.webbies.filter(
              current =>
                current.thread.active &&
                current.thread.anchor &&
                current.thread.anchor.kind === "boss"
            ).length;

          showMessage(
            hooks >= 2
              ? "Both hooks are in! Drag the wasp into a weave."
              : "One hook is in. Switch Webbie and hit it again.",
            1.4
          );
        } else if (cutSomething) {
          showMessage("Snip! The new silk crossed another strand.", 1.0);
        }

        refreshHud();
      }

      function updateThreadCrossCuts() {
        for (const cutter of state.webbies) {
          const a = cutter.prev;
          const b = cutter.pos;

          for (const owner of state.webbies) {
            if (owner === cutter || !owner.thread.active) {
              continue;
            }

            const c = owner.pos;
            const d = owner.thread.getAnchorPosition();
            const hit = segIntersect(a, b, c, d);

            if (hit) {
              owner.thread.release(false);
              burst(hit.x, hit.y, COLORS.danger, 10, 95);
              showMessage(`${cutter.name} crossed and cut ${owner.name}'s silk!`, 1.1);
              refreshHud();
            }
          }
        }
      }

      function drawAimGuide() {
        if (!state.aiming || !state.aimPoint) {
          return;
        }

        const active = getActive();
        if (!active) {
          return;
        }

        const dx = state.aimPoint.x - active.pos.x;
        const dy = state.aimPoint.y - active.pos.y;
        const dir = normalize(dx, dy);
        const length = Math.min(MAX_THREAD, Math.hypot(dx, dy));
        const end = {
          x: active.pos.x + dir.x * length,
          y: active.pos.y + dir.y * length
        };

        const g = new PIXI.Graphics();

        g.lineStyle(8, active.color, 0.08)
          .moveTo(active.pos.x, active.pos.y)
          .lineTo(end.x, end.y);

        g.lineStyle(2.1, COLORS.web, 0.82)
          .moveTo(active.pos.x, active.pos.y)
          .lineTo(end.x, end.y);

        for (let i = 1; i < 6; i += 1) {
          const t = i / 6;
          g.beginFill(0xffffff, 0.34)
            .drawCircle(
              lerp(active.pos.x, end.x, t),
              lerp(active.pos.y, end.y, t),
              1.6
            )
            .endFill();
        }

        g.beginFill(active.color, 0.94)
          .drawCircle(end.x, end.y, 6)
          .endFill();

        fxLayer.addChild(g);
        g._temporary = true;
      }

      function clearTemporaryFx() {
        for (let i = fxLayer.children.length - 1; i >= 0; i -= 1) {
          const child = fxLayer.children[i];
          if (child._temporary) {
            child.destroy();
          }
        }
      }

      function bindHold(button, onStart, onEnd) {
        button.addEventListener("pointerdown", event => {
          event.preventDefault();
          button.classList.add("is-held");
          onStart();
        });

        ["pointerup", "pointerleave", "pointercancel"].forEach(type => {
          button.addEventListener(type, event => {
            event.preventDefault();
            button.classList.remove("is-held");
            onEnd();
          });
        });
      }

      bindHold(leftBtn, () => {
        state.input.left = true;
      }, () => {
        state.input.left = false;
      });

      bindHold(rightBtn, () => {
        state.input.right = true;
      }, () => {
        state.input.right = false;
      });

      bindHold(upBtn, () => {
        state.input.up = true;
      }, () => {
        state.input.up = false;
      });

      bindHold(downBtn, () => {
        state.input.down = true;
      }, () => {
        state.input.down = false;
      });

      weaveBtn.addEventListener("click", createWeave);
      dropBtn.addEventListener("click", dropBoth);
      pauseBtn.addEventListener("click", togglePause);

      window.addEventListener("blur", () => {
        state.input.left = false;
        state.input.right = false;
        state.input.up = false;
        state.input.down = false;
      });

      drawBackdrop();
      buildScreen(0);

      app.ticker.add(() => {
        const rawDt = Math.min(app.ticker.deltaMS / 1000, 1 / 30);
        const timeScale = state.paused
          ? 0
          : state.aiming
            ? 0.35
            : 1;

        const dt = rawDt * timeScale;
        state.time += dt;

        if (state.messageTimer > 0) {
          state.messageTimer -= rawDt;

          if (state.messageTimer <= 0) {
            messageElement.classList.remove("is-visible");
          }
        }

        for (let i = 3; i < backdrop.children.length; i += 1) {
          const speck = backdrop.children[i];
          if (typeof speck._phase !== "number") {
            continue;
          }

          speck.y += Math.sin(state.time * speck._drift + speck._phase) * 0.02;
          speck.alpha = 0.1 + (Math.sin(state.time * 1.5 * speck._drift + speck._phase) + 1) * 0.07;
        }

        clearTemporaryFx();

        if (dt > 0 && !state.transitioning) {
          state.platforms.forEach(platform => {
            platform.update(dt);
            platform.draw();
          });

          state.weaves.forEach(weave => weave.clearPulls());

          state.webbies.forEach(webbie => webbie.update(dt));

          state.weaves.forEach(weave => {
            weave.update(dt);
          });

          state.webbies.forEach(webbie => {
            state.weaves.forEach(weave => {
              weave.collide(webbie);
            });
          });

          updateThreadCrossCuts();

          if (state.boss) {
            state.boss.update(dt);

            for (const webbie of state.webbies) {
              if (state.boss.defeated) {
                break;
              }

              const d = Math.hypot(webbie.pos.x - state.boss.x, webbie.pos.y - state.boss.y);
              if (d < webbie.radius + state.boss.radius - 6) {
                fail(`${state.boss.label.text} caught ${webbie.name}`);
                break;
              }
            }
          }

          for (const webbie of state.webbies) {
            if (webbie.pos.y > WORLD_H + FAIL_MARGIN) {
              fail(`${webbie.name} fell into the dark`);
              break;
            }
          }

          checkFinish();
        }

        state.weaves.forEach(weave => weave.draw());
        state.webbies.forEach(webbie => {
          webbie.thread.draw();
          webbie.draw();
        });

        if (state.boss) {
          state.boss.draw();
        }

        drawAimGuide();
        updateParticles(rawDt);
        refreshHud();
      });
    })();
  </script>
</body>
</html>
